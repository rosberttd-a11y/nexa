<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nexa — Entrena fuerte. Sin romperte.</title>
<meta name="description" content="Centro de Entrenamiento & Rehabilitación guiado por fisioterapeutas en Maracay, Venezuela. Entrena con criterio. Sin romperte." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<style>
  :root {
    --navy: #0b1c60;
    --blue: #3560e7;
    --blue-mid: #91afef;
    --blue-light: #d9e3fa;
    --white: #ffffff;
    --off-white: #f4f7fd;
    --gray-50: #f8faff;
    --gray-100: #e8edf8;
    --gray-400: #7b8bb5;
    --gray-600: #4a5578;
    --gray-800: #1e2a4a;
    --whatsapp: #25D366;
    --whatsapp-dark: #1ebe5a;

    --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
    --ease-pop: cubic-bezier(0.22, 1.2, 0.36, 1);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    color: var(--gray-800);
    background: var(--white);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
  }

  button { font-family: inherit; cursor: pointer; }
  a { color: inherit; text-decoration: none; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes pulse-soft {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50%      { opacity: 1; transform: scale(1.15); }
  }
  @keyframes float-circle {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    50%      { transform: translate(20px, -30px) rotate(8deg); }
  }
  @keyframes wa-glow {
    0%, 100% { box-shadow: 0 4px 20px rgba(37,211,102,0.40), 0 0 0 0 rgba(37,211,102,0.35); }
    50%      { box-shadow: 0 4px 24px rgba(37,211,102,0.50), 0 0 0 8px rgba(37,211,102,0.10); }
  }

  .reveal { opacity: 0; }
  .reveal.in { animation: fadeUp 0.8s var(--ease-pop) forwards; }

  /* ---------- Navbar ---------- */
  .nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background 0.3s ease, backdrop-filter 0.3s ease, padding 0.3s ease, border-color 0.3s ease;
    border-bottom: 1px solid transparent;
  }
  .nav.scrolled {
    background: rgba(11, 28, 96, 0.55);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    border-bottom-color: rgba(145, 175, 239, 0.15);
    padding: 12px 32px;
  }
  .nav-logo {
    display: flex; align-items: center;
    color: var(--white);
    text-decoration: none;
  }
  .nav-logo-img {
    display: block;
    height: 60px;
    width: auto;
    filter: brightness(0) invert(1);
    opacity: 0.95;
    transition: opacity 0.25s ease, height 0.3s ease;
  }
  .nav-logo:hover .nav-logo-img { opacity: 1; }
  .nav.scrolled .nav-logo-img { height: 50px; }
  .nav-links {
    display: flex; align-items: center; gap: 32px;
  }
  .nav-links a {
    color: rgba(255,255,255,0.78);
    font-size: 14px;
    font-weight: 500;
    transition: color 0.2s ease;
  }
  .nav-links a:hover { color: var(--white); }
  .nav-cta {
    background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
    color: var(--white);
    border: none;
    padding: 10px 22px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.01em;
    transition: all 0.3s ease;
    box-shadow: 0 4px 16px rgba(53, 96, 231, 0.30);
  }
  .nav-cta:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(53, 96, 231, 0.45);
  }

  /* ---------- Hero ---------- */
  .hero {
    position: relative;
    min-height: 100vh;
    width: 100%;
    overflow: hidden;
    color: var(--white);
    display: flex;
    align-items: center;
    padding: 140px 32px 80px;
  }

  .hero-photo-stack {
    position: absolute;
    inset: 0;
    z-index: 0;
    background: var(--navy);
  }
  .hero-photo-layer {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: 70% center;
    background-color: var(--navy);
    filter: saturate(0.85) contrast(1.08) brightness(0.95);
    opacity: 0;
    transition: opacity 1.1s var(--ease-smooth), filter 1.1s var(--ease-smooth);
  }
  .hero-photo-layer.active { opacity: 1; }
  /* ── Hero photos: reemplaza las URLs de Unsplash con tus fotos locales ──
     Ejemplo:  url('assets/hero-default.jpg')
     object-position se controla con background-position en cada capa.  */
  .hero-photo-layer.p-default {
    background-image: url('assets/hero-standar.png');
  }
  .hero-photo-layer.p-1 {
    background-image: url('assets/hero-1.png');
    background-position: 65% center;
  }
  .hero-photo-layer.p-2 {
    background-image: url('assets/hero-2.png');
    background-position: 60% center;
  }
  .hero-photo-layer.p-3 {
    background-image: url('assets/hero-3.png');
    background-position: 65% center;
  }
  .hero-photo-layer.p-4 {
    background-image: url('assets/hero-4.png');
    background-position: 60% center;
  }
  @keyframes photoSettle {
    from { transform: scale(1.04); }
    to { transform: scale(1); }
  }
  .hero-photo-layer.active {
    animation: photoSettle 1.6s var(--ease-smooth);
  }

  .hero-overlay {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(90deg,
        rgba(8, 18, 60, 0.97) 0%,
        rgba(11, 28, 96, 0.88) 30%,
        rgba(11, 28, 96, 0.55) 60%,
        rgba(11, 28, 96, 0.25) 100%),
      linear-gradient(180deg,
        rgba(11, 28, 96, 0.15) 0%,
        rgba(11, 28, 96, 0.0) 30%,
        rgba(5, 10, 30, 0.45) 100%);
    z-index: 1;
  }
  .hero-overlay::after {
    content: '';
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(217, 227, 250, 0.06) 1px, transparent 1px);
    background-size: 28px 28px;
    opacity: 0.7;
  }

  .hero-circles {
    position: absolute; inset: 0; z-index: 2;
    pointer-events: none;
    overflow: hidden;
  }
  .hero-circle {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(145, 175, 239, 0.14);
  }
  .hero-circle.c1 {
    width: 580px; height: 580px;
    top: -120px; right: -160px;
    animation: float-circle 18s ease-in-out infinite;
  }
  .hero-circle.c2 {
    width: 380px; height: 380px;
    top: 38%; right: 8%;
    border-color: rgba(145, 175, 239, 0.10);
    animation: float-circle 22s ease-in-out infinite reverse;
  }
  .hero-circle.c3 {
    width: 240px; height: 240px;
    bottom: -60px; left: 36%;
    border-color: rgba(145, 175, 239, 0.08);
    animation: float-circle 26s ease-in-out infinite;
  }

  .hero-grain {
    position: absolute; inset: 0; z-index: 2;
    pointer-events: none;
    background: linear-gradient(180deg, transparent 70%, rgba(5, 10, 30, 0.55) 100%);
  }

  .hero-inner {
    position: relative;
    z-index: 3;
    max-width: 1240px;
    margin: 0 auto;
    width: 100%;
  }

  .hero-content {
    max-width: 680px;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--blue-mid);
  }
  .eyebrow-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--blue-mid);
    box-shadow: 0 0 12px var(--blue-mid);
    animation: pulse-soft 2.4s ease-in-out infinite;
  }

  .hero h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-weight: 400;
    font-size: clamp(56px, 8.4vw, 96px);
    line-height: 0.95;
    letter-spacing: 0.02em;
    margin: 20px 0 0;
    color: var(--white);
  }
  .hero h1 .line2 {
    display: block;
    background: linear-gradient(135deg, #ffffff 0%, var(--blue-mid) 35%, var(--blue) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-subtitle {
    font-size: 18px;
    line-height: 1.55;
    color: rgba(255, 255, 255, 0.78);
    max-width: 480px;
    margin: 24px 0 0;
    min-height: 56px;
  }
  .hero-sub-text {
    display: inline-block;
    transition: opacity 0.35s ease;
  }
  .hero-sub-text.fading { opacity: 0; }

  .selector-label {
    margin: 44px 0 16px;
    font-size: 13px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.55);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    display: flex; align-items: center; gap: 12px;
  }
  .selector-label::before {
    content: '';
    width: 28px; height: 1px;
    background: rgba(255,255,255,0.35);
  }

  .profile-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    max-width: 680px;
  }

  .profile-alt {
    margin-top: 14px;
    max-width: 680px;
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1.5px dashed rgba(145, 175, 239, 0.30);
    border-radius: 14px;
    padding: 14px 22px;
    cursor: pointer;
    transition: opacity 0.3s var(--ease-smooth), background 0.3s var(--ease-smooth), border-color 0.3s var(--ease-smooth), transform 0.3s var(--ease-smooth), box-shadow 0.3s var(--ease-smooth);
    text-align: left;
    color: var(--white);
    display: flex; align-items: center; gap: 16px;
    font-family: inherit;
    animation: fadeUp 0.8s var(--ease-pop) 0.7s both;
  }
  .profile-alt:hover {
    background: rgba(53, 96, 231, 0.14);
    border-color: rgba(145, 175, 239, 0.55);
    border-style: solid;
  }
  .profile-alt.active {
    background: rgba(53, 96, 231, 0.20);
    border-color: var(--blue);
    border-style: solid;
    box-shadow: 0 0 0 1px var(--blue);
  }
  .profile-alt.dim { opacity: 0.45; }
  .profile-alt-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: rgba(145, 175, 239, 0.12);
    border: 1px solid rgba(145, 175, 239, 0.2);
    display: grid; place-items: center;
    color: var(--blue-mid);
    flex-shrink: 0;
  }
  .profile-alt.active .profile-alt-icon {
    background: rgba(255,255,255,0.14);
    color: var(--white);
    border-color: rgba(255,255,255,0.25);
  }
  .profile-alt-text {
    font-size: 14px;
    line-height: 1.4;
    color: rgba(255,255,255,0.85);
    flex: 1;
  }
  .profile-alt-text strong {
    color: var(--white);
    font-weight: 600;
  }
  .profile-alt-arrow {
    flex-shrink: 0;
    width: 28px; height: 28px;
    display: grid; place-items: center;
    color: var(--blue-mid);
    transition: transform 0.3s var(--ease-pop), color 0.2s ease;
  }
  .profile-alt:hover .profile-alt-arrow { transform: translateX(4px); color: var(--white); }
  .profile-alt-arrow svg { width: 16px; height: 16px; }

  .profile {
    position: relative;
    background: rgba(255, 255, 255, 0.06);
    border: 1.5px solid rgba(145, 175, 239, 0.20);
    border-radius: 14px;
    padding: 20px 22px 22px;
    cursor: pointer;
    transition: all 0.3s var(--ease-smooth);
    text-align: left;
    color: var(--white);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex; flex-direction: column; gap: 14px;
    min-height: 130px;
    font-family: inherit;
  }
  .profile:hover {
    background: rgba(53, 96, 231, 0.18);
    border-color: rgba(145, 175, 239, 0.55);
    transform: translateY(-3px);
  }
  .profile.active {
    background: rgba(53, 96, 231, 0.25);
    border-color: var(--blue);
    box-shadow: 0 0 0 1px var(--blue), 0 16px 40px -16px rgba(53, 96, 231, 0.7);
    transform: translateY(-3px);
  }
  .profile.dim { opacity: 0.45; }
  .profile.dim:hover { opacity: 0.85; transform: none; }

  .profile-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: rgba(145, 175, 239, 0.15);
    border: 1px solid rgba(145, 175, 239, 0.2);
    display: grid; place-items: center;
    color: var(--blue-mid);
    transition: all 0.3s var(--ease-smooth);
  }
  .profile.active .profile-icon {
    background: rgba(255, 255, 255, 0.12);
    border-color: rgba(255,255,255,0.25);
    color: var(--white);
  }
  .profile-text {
    font-size: 14.5px;
    line-height: 1.4;
    font-weight: 500;
    color: var(--white);
  }
  .profile-num {
    position: absolute;
    top: 14px; right: 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 0.08em;
    color: rgba(145, 175, 239, 0.5);
  }
  .profile.active .profile-num { color: var(--blue-mid); }

  .profile {
    transition:
      padding 0.45s var(--ease-pop),
      min-height 0.45s var(--ease-pop),
      background 0.3s var(--ease-smooth),
      border-color 0.3s var(--ease-smooth),
      box-shadow 0.3s var(--ease-smooth),
      transform 0.3s var(--ease-smooth),
      opacity 0.3s ease;
  }
  .profile-text, .profile-icon, .profile-num {
    transition: all 0.4s var(--ease-pop);
  }

  .hero { transition: padding 0.5s var(--ease-pop); }
  .hero.is-selected .selector-label {
    opacity: 0.55;
    font-size: 12px;
    margin: 28px 0 12px;
    transition: all 0.4s var(--ease-smooth);
  }
  .hero.is-selected .selector-label::before {
    background: rgba(255,255,255,0.2);
  }

  .hero.is-selected .profile.dim {
    min-height: 56px;
    padding: 10px 14px;
    flex-direction: row;
    align-items: center;
    gap: 10px;
    opacity: 0.55;
  }
  .hero.is-selected .profile.dim .profile-num { opacity: 0; transform: scale(0.6); }
  .hero.is-selected .profile.dim .profile-icon {
    width: 28px; height: 28px;
    border-radius: 7px;
    flex-shrink: 0;
  }
  .hero.is-selected .profile.dim .profile-icon svg {
    width: 14px; height: 14px;
  }
  .hero.is-selected .profile.dim .profile-text {
    font-size: 12.5px;
    line-height: 1.3;
    font-weight: 500;
    color: rgba(255,255,255,0.7);
  }
  .hero.is-selected .profile.active {
    padding: 22px 24px 24px;
    flex-direction: column;
    align-items: flex-start;
    gap: 14px;
    transform: translateY(-3px);
    min-height: 130px;
  }
  .hero.is-selected .profile-alt.active {
    opacity: 1;
  }
  .hero.is-selected .profile-alt:not(.active):not(.hide-alt) {
    opacity: 0.35;
    padding: 10px 16px;
  }
  .hero.is-selected .profile-alt:not(.active):not(.hide-alt) .profile-alt-icon {
    width: 26px; height: 26px;
  }
  .hero.is-selected .profile-alt:not(.active):not(.hide-alt) .profile-alt-text {
    font-size: 12.5px;
  }
  .profile-alt.hide-alt {
    height: 0;
    margin: 0;
    padding-top: 0;
    padding-bottom: 0;
    border-width: 0;
    opacity: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .hero.is-selected .hero-subtitle {
    font-size: 20px;
    color: rgba(255, 255, 255, 0.92);
    transition: all 0.4s var(--ease-smooth);
  }

  .next-step {
    margin-top: 22px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(145, 175, 239, 0.20);
    border-radius: 50px;
    padding: 8px 16px 8px 14px;
    cursor: pointer;
    transition: all 0.3s var(--ease-smooth);
    opacity: 0;
    transform: translateY(8px);
    animation: nextStepIn 0.5s var(--ease-pop) 0.2s forwards;
    font-family: inherit;
  }
  .next-step:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(145, 175, 239, 0.45);
    transform: translateY(-1px);
  }
  .next-step svg {
    width: 14px; height: 14px;
    color: var(--blue-mid);
    animation: nudgeDown 1.8s var(--ease-smooth) infinite;
  }
  @keyframes nextStepIn {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes nudgeDown {
    0%, 70%, 100% { transform: translateY(0); }
    35% { transform: translateY(3px); }
  }

  .selector-prompt {
    margin-top: 28px;
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 14px 22px;
    background: rgba(255, 255, 255, 0.04);
    border: 1.5px dashed rgba(145, 175, 239, 0.32);
    border-radius: 50px;
    color: rgba(255, 255, 255, 0.78);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.01em;
    transition: opacity 0.4s ease, transform 0.4s var(--ease-pop);
  }
  .selector-prompt-arrow {
    width: 18px; height: 18px;
    color: var(--blue-mid);
    animation: nudgeUp 1.6s var(--ease-smooth) infinite;
  }
  @keyframes nudgeUp {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-4px); }
  }

  .recommended-chip {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px 8px 12px;
    background: rgba(217, 227, 250, 0.08);
    border: 1px solid rgba(145, 175, 239, 0.30);
    border-radius: 50px;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.88);
    font-weight: 500;
    letter-spacing: 0.01em;
    cursor: pointer;
    transition: all 0.3s var(--ease-smooth);
    opacity: 0;
    transform: translateY(8px);
    animation: chipIn 0.5s var(--ease-pop) 0.15s forwards;
    text-decoration: none;
    margin-top: 18px;
  }
  .recommended-chip:hover {
    background: rgba(217, 227, 250, 0.14);
    border-color: var(--blue);
    transform: translateY(-1px);
  }
  .recommended-chip-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--blue-mid);
  }
  .recommended-chip-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 17px;
    letter-spacing: 0.04em;
    color: var(--white);
  }
  .recommended-chip svg {
    width: 12px; height: 12px;
    color: var(--blue-mid);
    transition: transform 0.2s ease;
  }
  .recommended-chip:hover svg { transform: translateX(3px); color: var(--white); }
  @keyframes chipIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .sticky-prompt {
    position: fixed;
    left: 50%;
    bottom: 22px;
    transform: translateX(-50%) translateY(20px);
    z-index: 998;
    background: rgba(11, 28, 96, 0.92);
    backdrop-filter: blur(16px) saturate(140%);
    -webkit-backdrop-filter: blur(16px) saturate(140%);
    border: 1px solid rgba(145, 175, 239, 0.25);
    border-radius: 16px;
    padding: 10px 12px 10px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 16px 48px -12px rgba(11, 28, 96, 0.55), 0 4px 16px rgba(0,0,0,0.15);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.45s var(--ease-smooth), transform 0.45s var(--ease-pop);
    max-width: calc(100vw - 32px);
  }
  .sticky-prompt.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
    pointer-events: auto;
  }
  .sticky-prompt-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--white);
    white-space: nowrap;
  }
  .sticky-prompt-chips {
    display: flex;
    gap: 6px;
  }
  .sticky-chip {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(145, 175, 239, 0.20);
    border-radius: 50px;
    padding: 7px 12px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.85);
    cursor: pointer;
    transition: all 0.2s var(--ease-smooth);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .sticky-chip svg { width: 12px; height: 12px; color: var(--blue-mid); }
  .sticky-chip:hover {
    background: rgba(53, 96, 231, 0.25);
    border-color: var(--blue);
    color: var(--white);
  }
  .sticky-chip:hover svg { color: var(--white); }
  .sticky-prompt-close {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.06);
    border: none;
    color: rgba(255, 255, 255, 0.55);
    cursor: pointer;
    display: grid; place-items: center;
    font-family: inherit;
    transition: all 0.2s ease;
    flex-shrink: 0;
  }
  .sticky-prompt-close:hover { background: rgba(255, 255, 255, 0.12); color: var(--white); }
  .sticky-prompt-close svg { width: 12px; height: 12px; }

  .cta-block {
    margin-top: 28px;
    display: flex; flex-direction: column; align-items: flex-start; gap: 10px;
  }

  .wa-cta {
    background: var(--whatsapp);
    color: var(--white);
    border: none;
    border-radius: 50px;
    padding: 15px 28px;
    font-weight: 700;
    font-size: 15px;
    display: inline-flex; align-items: center; gap: 10px;
    box-shadow: 0 8px 28px rgba(37, 211, 102, 0.40);
    transition: all 0.3s var(--ease-smooth);
    min-width: 280px;
    justify-content: center;
  }
  .wa-cta:hover {
    transform: translateY(-2px);
    background: var(--whatsapp-dark);
    box-shadow: 0 14px 36px rgba(37, 211, 102, 0.55);
  }
  .wa-cta-label {
    transition: opacity 0.25s ease;
  }
  .wa-cta-label.fading { opacity: 0; }
  .wa-cta svg { width: 18px; height: 18px; }

  @keyframes ctaPing {
    0% { transform: scale(0.95); opacity: 0.6; }
    100% { transform: scale(1.5); opacity: 0; }
  }
  .wa-cta-wrap {
    position: relative;
    display: inline-block;
  }
  .wa-cta-wrap::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50px;
    background: rgba(37, 211, 102, 0.45);
    pointer-events: none;
    opacity: 0;
  }
  .wa-cta-wrap.ping::before {
    animation: ctaPing 0.7s var(--ease-pop) forwards;
  }

  .cta-caption {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.45);
    margin-left: 4px;
  }

  .scroll-hint {
    position: absolute;
    bottom: 28px; left: 50%;
    transform: translateX(-50%);
    z-index: 3;
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    animation: pulse-soft 3s ease-in-out infinite;
    transition: opacity 0.4s ease;
  }
  .hero.is-selected .scroll-hint { opacity: 0; pointer-events: none; }
  .scroll-hint .bar {
    width: 1px; height: 32px;
    background: linear-gradient(180deg, rgba(255,255,255,0.4), transparent);
  }

  /* ---------- WhatsApp Float ---------- */
  .wa-float {
    position: fixed;
    bottom: 24px; right: 24px;
    z-index: 999;
    background: var(--whatsapp);
    color: var(--white);
    border: none;
    border-radius: 50px;
    padding: 14px 20px 14px 16px;
    font-weight: 700;
    font-size: 14px;
    display: inline-flex; align-items: center; gap: 10px;
    box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4);
    animation: wa-glow 3.6s ease-in-out infinite;
    transition: transform 0.3s ease, opacity 0.4s ease;
    opacity: 0;
    pointer-events: none;
  }
  .wa-float.show {
    opacity: 1;
    pointer-events: auto;
  }
  .wa-float:hover {
    transform: translateY(-3px);
    background: var(--whatsapp-dark);
  }
  .wa-float svg { width: 22px; height: 22px; }
  .wa-float .label { white-space: nowrap; }

  /* ---------- Shared Section Primitives ---------- */
  .section {
    position: relative;
    padding: 100px 32px;
    width: 100%;
  }
  .section-inner {
    max-width: 1180px;
    margin: 0 auto;
  }
  .section-divider {
    width: 48px; height: 3px;
    background: linear-gradient(90deg, var(--blue), var(--blue-mid));
    border-radius: 2px;
    margin-bottom: 20px;
  }
  .section-divider.center { margin-left: auto; margin-right: auto; }

  .eyebrow-dark {
    display: inline-block;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--blue);
    margin-bottom: 16px;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-weight: 400;
    font-size: clamp(38px, 5.6vw, 56px);
    line-height: 0.98;
    letter-spacing: 0.02em;
    color: var(--navy);
    margin: 0 0 24px;
  }
  .section-title .grad {
    background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .section-lead {
    font-size: 16px;
    line-height: 1.6;
    color: var(--gray-600);
    max-width: 620px;
  }
  .section-head.center {
    text-align: center;
    display: flex; flex-direction: column; align-items: center;
  }
  .section-head.center .section-lead { margin-left: auto; margin-right: auto; }

  /* ---------- Section 1 — Tu primera sesion ---------- */
  .first-session {
    background: var(--white);
    padding: 0;
    position: relative;
  }
  .first-session::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 80px;
    background: linear-gradient(180deg, rgba(11,28,96,0.05) 0%, rgba(255,255,255,0) 100%);
    pointer-events: none;
  }
  .first-session-grid {
    display: grid;
    grid-template-columns: 55% 45%;
    min-height: 640px;
    align-items: stretch;
  }
  .first-session-photo {
    position: relative;
    background: var(--navy);
    overflow: hidden;
    min-height: 540px;
  }
  .fs-photo-content {
    position: absolute; inset: 0;
    transition: opacity 0.35s ease;
  }
  .fs-photo-content.swap-out { opacity: 0; }
  /* Real photo image */
  .fs-photo-img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    image-orientation: from-image;
  }
  /* Gradient overlay on top of real photo */
  .first-session-photo::before {
    content: '';
    position: absolute; inset: 0;
    z-index: 1;
    pointer-events: none;
  }
  .first-session-photo.has-photo::before {
    background: linear-gradient(to right, transparent 40%, rgba(11,28,96,0.03) 100%),
                linear-gradient(to top, rgba(11,28,96,0.55) 0%, transparent 50%);
  }
  .first-session-photo:not(.has-photo)::before {
    background-image:
      linear-gradient(135deg, rgba(11,28,96,0.85) 0%, rgba(53,96,231,0.65) 100%),
      radial-gradient(circle at 30% 30%, rgba(217,227,250,0.15) 0%, transparent 50%);
  }
  .first-session-photo::after {
    content: '';
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(217,227,250,0.07) 1px, transparent 1px);
    background-size: 28px 28px;
    z-index: 2;
  }
  .first-session-photo.has-photo::after { display: none; }
  .photo-tag {
    position: absolute;
    inset: 0;
    z-index: 3;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 48px;
    color: var(--blue-mid);
  }
  .photo-tag .label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    color: rgba(217,227,250,0.55);
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .photo-tag .label::before {
    content: '';
    width: 24px; height: 1px;
    background: rgba(217,227,250,0.45);
  }
  .photo-tag .desc {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    line-height: 1.0;
    letter-spacing: 0.02em;
    color: var(--white);
    max-width: 380px;
  }
  .photo-tag .meta {
    margin-top: 18px;
    font-size: 13px;
    color: rgba(217,227,250,0.65);
    font-weight: 500;
    max-width: 380px;
    line-height: 1.5;
  }
  .photo-decor {
    position: absolute;
    z-index: 3;
    border-radius: 50%;
    border: 1px solid rgba(217,227,250,0.18);
  }
  .photo-decor.d1 {
    width: 260px; height: 260px;
    top: -60px; right: -80px;
  }
  .photo-decor.d2 {
    width: 140px; height: 140px;
    bottom: 28%; right: 12%;
    border-color: rgba(217,227,250,0.12);
  }
  .photo-number {
    position: absolute;
    top: 48px; left: 48px;
    z-index: 3;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 96px;
    line-height: 1;
    letter-spacing: 0.02em;
    color: rgba(217,227,250,0.10);
  }

  .first-session-text {
    padding: 100px 32px 100px 64px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .fs-text-content {
    transition: opacity 0.35s ease;
  }
  .fs-text-content.swap-out { opacity: 0; }
  .first-session-text .body {
    font-size: 16px;
    line-height: 1.65;
    color: var(--gray-600);
    max-width: 520px;
  }
  .first-session-text .body p { margin: 0 0 18px; }
  .first-session-text .body p:last-child { margin-bottom: 0; }
  .first-session-text .body strong { color: var(--gray-800); font-weight: 600; }

  @keyframes slideInLeft {
    from { opacity: 0; transform: translateX(-32px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .reveal-left { opacity: 0; }
  .reveal-left.in { animation: slideInLeft 0.8s var(--ease-pop) forwards; }

  /* ---------- Section 2 — Planes ---------- */
  .plans {
    background: var(--gray-50);
    position: relative;
  }
  .plans::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(53,96,231,0.06) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
    opacity: 0.6;
  }
  .plans .section-inner { position: relative; z-index: 1; }

  .plans-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    margin-top: 64px;
    align-items: stretch;
    transition: opacity 0.3s ease;
  }
  .plans-grid.swap-out { opacity: 0; }
  .plans-grid-wrap { width: 100%; }

  .plan-card {
    position: relative;
    background: var(--white);
    border: 1px solid rgba(11, 28, 96, 0.08);
    border-radius: 20px;
    padding: 32px 28px;
    display: flex; flex-direction: column;
    transition: all 0.4s var(--ease-smooth);
    box-shadow: 0 4px 20px rgba(11, 28, 96, 0.03);
  }
  .plan-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 40px rgba(11, 28, 96, 0.10);
  }
  .plan-card.featured {
    transform: scale(1.03);
    border: 1.5px solid transparent;
    background:
      linear-gradient(var(--white), var(--white)) padding-box,
      linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%) border-box;
    box-shadow: 0 24px 56px -16px rgba(53, 96, 231, 0.35), 0 4px 20px rgba(11, 28, 96, 0.08);
    z-index: 2;
  }
  .plan-card.featured:hover {
    transform: scale(1.03) translateY(-4px);
  }
  .plan-price .amount.amount-sm {
    font-size: 26px;
    line-height: 1.1;
    letter-spacing: 0.01em;
  }

  .p3-callout {
    margin-top: 32px;
    background: linear-gradient(135deg, rgba(11, 28, 96, 0.04), rgba(53, 96, 231, 0.06));
    border: 1px solid rgba(53, 96, 231, 0.18);
    border-radius: 14px;
    padding: 18px 24px;
    max-width: 720px;
    margin-left: auto; margin-right: auto;
    animation: fadeUp 0.5s var(--ease-pop);
  }
  .p3-callout-row {
    display: flex;
    gap: 14px;
    align-items: baseline;
    flex-wrap: wrap;
  }
  .p3-callout-label {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--blue);
    white-space: nowrap;
  }
  .p3-callout-text {
    font-size: 14px;
    color: var(--gray-600);
    line-height: 1.55;
    flex: 1;
    min-width: 200px;
  }
  .plan-pill {
    position: absolute;
    top: -14px; left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
    color: var(--white);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 50px;
    white-space: nowrap;
    box-shadow: 0 8px 20px rgba(53, 96, 231, 0.35);
  }
  .plan-badge {
    display: inline-block;
    background: var(--blue-light);
    color: var(--navy);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 6px 12px;
    border-radius: 50px;
    margin-bottom: 18px;
    align-self: flex-start;
  }
  .plan-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    line-height: 1;
    letter-spacing: 0.02em;
    color: var(--navy);
    margin: 0 0 4px;
  }
  .plan-price {
    display: flex; align-items: baseline; gap: 4px;
    margin-bottom: 24px;
  }
  .plan-price .amount {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px;
    line-height: 1;
    letter-spacing: 0.02em;
    color: var(--navy);
  }
  .plan-card.featured .plan-price .amount {
    background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .plan-price .period {
    font-size: 14px;
    color: var(--gray-400);
    font-weight: 500;
  }
  .plan-features {
    list-style: none;
    margin: 0 0 28px;
    padding: 0;
    border-top: 1px solid rgba(11,28,96,0.08);
    padding-top: 20px;
    flex: 1;
  }
  .plan-features li {
    display: flex; align-items: flex-start; gap: 10px;
    font-size: 14px;
    line-height: 1.5;
    color: var(--gray-600);
    padding: 7px 0;
  }
  .plan-features li svg {
    flex: 0 0 16px;
    width: 16px; height: 16px;
    color: var(--blue);
    margin-top: 3px;
  }
  .plan-footnote {
    font-size: 12px;
    color: var(--gray-400);
    margin: -10px 0 18px;
    font-style: italic;
  }
  .plan-cta {
    display: inline-flex; justify-content: center; align-items: center; gap: 8px;
    width: 100%;
    padding: 14px 20px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.3s ease;
    border: 1.5px solid var(--blue-mid);
    background: transparent;
    color: var(--navy);
  }
  .plan-cta:hover {
    border-color: var(--blue);
    background: var(--blue-light);
  }
  .plan-cta svg { width: 16px; height: 16px; flex-shrink: 0; }
  .plan-cta.primary {
    background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
    color: var(--white);
    border-color: transparent;
    box-shadow: 0 8px 24px rgba(53, 96, 231, 0.25);
  }
  .plan-cta.primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(53, 96, 231, 0.40);
  }

  .featured-reason {
    text-align: center;
    margin-top: 24px;
    font-size: 14px;
    color: var(--blue);
    font-weight: 600;
    font-style: italic;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .featured-reason.show {
    opacity: 1;
    transform: translateY(0);
  }

  .plans-included {
    text-align: center;
    margin-top: 40px;
    font-size: 13px;
    color: var(--gray-400);
    font-weight: 500;
    letter-spacing: 0.01em;
  }
  .plans-included .dot {
    display: inline-block;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: var(--gray-400);
    margin: 0 12px;
    transform: translateY(-3px);
  }
  .plans-bcv-note {
    text-align: center;
    margin-top: 8px;
    font-size: 12px;
    color: var(--gray-400);
    letter-spacing: 0.01em;
  }
  .plans-bcv-note strong {
    color: var(--blue);
    font-weight: 700;
  }

  .p4-callout {
    margin-top: 40px;
    background: var(--blue-light);
    border-radius: 16px;
    padding: 28px 32px;
    color: var(--navy);
    font-size: 15px;
    line-height: 1.55;
    text-align: center;
    max-width: 720px;
    margin-left: auto; margin-right: auto;
    border: 1px solid rgba(53, 96, 231, 0.15);
    animation: fadeUp 0.6s var(--ease-pop);
  }
  .p4-callout strong { color: var(--blue); font-weight: 700; }

  /* ---------- Section 3 — Servicios ---------- */
  .services-compact {
    background: var(--white);
    padding: 48px 32px 80px;
  }
  .services-compact-inner {
    max-width: 1180px;
    margin: 0 auto;
  }
  .services-compact-label {
    text-align: center;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    color: var(--gray-400);
    margin-bottom: 24px;
    display: flex; align-items: center; gap: 16px;
    justify-content: center;
  }
  .services-compact-label::before,
  .services-compact-label::after {
    content: '';
    width: 60px; height: 1px;
    background: rgba(11, 28, 96, 0.12);
  }

  .services-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  .service-card {
    background: var(--white);
    border: 1px solid rgba(11, 28, 96, 0.10);
    border-radius: 16px;
    padding: 28px 30px;
    transition: all 0.3s var(--ease-smooth);
    display: flex; flex-direction: column;
    position: relative;
  }
  .service-card:hover {
    border-color: var(--blue-mid);
    transform: translateY(-3px);
    box-shadow: 0 16px 40px rgba(11, 28, 96, 0.08);
  }
  .service-card .row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
    gap: 16px;
  }
  .service-card .name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    line-height: 1;
    letter-spacing: 0.02em;
    color: var(--navy);
  }
  .service-card .price {
    font-size: 13px;
    font-weight: 600;
    color: var(--blue);
    text-align: right;
    white-space: nowrap;
  }
  .service-card .desc {
    font-size: 14px;
    line-height: 1.55;
    color: var(--gray-600);
    margin: 0 0 18px;
    flex: 1;
  }
  .service-link {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px;
    font-weight: 600;
    color: var(--blue);
    background: none; border: none; padding: 0;
    cursor: pointer;
    transition: gap 0.2s ease, color 0.2s ease;
    align-self: flex-start;
  }
  .service-link:hover { gap: 10px; color: var(--navy); }
  .service-link svg { width: 14px; height: 14px; }

  .services-elevated {
    background: var(--gray-50);
  }
  .services-elevated .services-grid {
    margin-top: 64px;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  .services-elevated .service-card {
    padding: 40px 36px;
    border-radius: 20px;
    border: 1px solid rgba(11, 28, 96, 0.08);
    box-shadow: 0 4px 20px rgba(11, 28, 96, 0.04);
  }
  .services-elevated .service-card .name { font-size: 38px; }
  .services-elevated .service-card .desc { font-size: 15px; margin-bottom: 24px; }
  .services-elevated .service-card .price { font-size: 14px; }

  /* ---------- Section 4 — Equipo ---------- */
  .team {
    background: var(--navy);
    color: var(--white);
    position: relative;
    overflow: hidden;
  }
  .team::before {
    content: '';
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(217,227,250,0.05) 1px, transparent 1px);
    background-size: 32px 32px;
    opacity: 0.6;
    pointer-events: none;
  }
  .team-decor {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(145,175,239,0.10);
    pointer-events: none;
  }
  .team-decor.t1 {
    width: 480px; height: 480px;
    top: -120px; left: -160px;
  }
  .team-decor.t2 {
    width: 280px; height: 280px;
    bottom: -100px; right: 30%;
    border-color: rgba(145,175,239,0.07);
  }

  .team .section-inner {
    position: relative; z-index: 1;
    display: grid;
    grid-template-columns: 45% 55%;
    gap: 64px;
    align-items: center;
  }
  .team-divider {
    width: 48px; height: 3px;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--white), rgba(255,255,255,0.3));
    margin-bottom: 20px;
  }
  .team .eyebrow-dark {
    color: var(--blue-mid);
  }

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef } = React;

const WA_NUMBER = '584220430323';

const PROFILES = [

    waMsg: 'Hola, estoy saliendo de una lesión y quiero retomar el entrenamiento. Me interesa conocer Nexa.'

    id: 3,
    text: 'Quiero mejorar mi rendimiento deportivo',
    icon: 'trending',
    subtitle: 'Rendir más no es solo entrenar más duro. Es entrenar con criterio.',
    waMsg: 'Hola, practico deporte y quiero mejorar mi rendimiento. Me interesa conocer Nexa.'

const INJURY_PROFILE = {

  waMsg: 'Hola, tengo una lesión y me interesa una sesión de fisioterapia en Nexa.'
};

const DEFAULT_SUBTITLE = 'Entrena hoy para seguir entrenando mañana.';
const DEFAULT_WA = 'Hola, me interesa conocer Nexa.';

const RECOMMENDED_PLAN = {
  1: { key: 'base',    name: 'Nexa Base' },
  2: { key: 'control', name: 'Nexa Control' },
  3: { key: 'elite',   name: 'Nexa Élite' },

};

  if (name === 'activity') return (
    <svg {...props}><path d="M22 12h-4l-3 9L9 3l-3 9H2" /></svg>

  if (name === 'heart') return (
    <svg {...props}>
      <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.29 1.51 4.04 3 5.5l7 7Z" />

  if (name === 'trending') return (

}

function ArrowRight() {

    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M5 12h14" /><path d="m12 5 7 7-7 7" />

}

function WhatsAppGlyph() {
  return (
    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M.057 24l1.687-6.163a11.867 11.867 0 0 1-1.587-5.946C.16 5.335 5.495 0 12.05 0a11.817 11.817 0 0 1 8.413 3.488 11.824 11.824 0 0 1 3.48 8.414c-.003 6.557-5.338 11.892-11.893 11.892a11.9 11.9 0 0 1-5.688-1.448L.057 24zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884a9.86 9.86 0 0 0 1.51 5.26l.39.625-1 3.648 3.74-.981.849.749zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01a1.092 1.092 0 0 0-.793.372c-.272.297-1.04 1.016-1.04 2.479s1.065 2.876 1.213 3.074c.149.198 2.095 3.2 5.076 4.487.711.307 1.265.49 1.697.628.713.226 1.362.194 1.876.118.572-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413z" />
    </svg>
  );
}

function useReveal(threshold = 0.15) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    const el = ref.current;
    const io = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) {
        el.classList.add('in');
        io.disconnect();
      }
    }, { threshold });
    io.observe(el);
    return () => io.disconnect();
  }, [threshold]);
  return ref;
}

function Navbar({ onCta }) {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 40);
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return (
    <nav className={`nav ${scrolled ? 'scrolled' : ''}`}>
      <a href="#top" className="nav-logo" aria-label="Nexa — inicio">
        <img className="nav-logo-img" src="assets/nexa-mark.png" alt="Nexa" />
      </a>
      <div className="nav-links">
        <a href="#planes">Planes</a>
        <a href="#servicios">Servicios</a>
        <a href="#ubicacion">Ubicación</a>
      </div>
      <button className="nav-cta" onClick={onCta}>Escríbenos</button>
    </nav>
  );
}

function Hero({ selected, setSelected, waUrl }) {
  const [hovered, setHovered] = useState(null);
  const [fadingSub, setFadingSub] = useState(false);
  const [displaySub, setDisplaySub] = useState(DEFAULT_SUBTITLE);
  const [fadingCta, setFadingCta] = useState(false);
  const [displayCta, setDisplayCta] = useState('Escríbenos por WhatsApp');
  const [pingKey, setPingKey] = useState(0);
  const previousSelected = useRef(null);

  const effective = hovered ?? selected;

  useEffect(() => {
    let next = DEFAULT_SUBTITLE;
    if (effective) {
      const found = [...PROFILES, INJURY_PROFILE].find(p => p.id === effective);
      if (found) next = found.subtitle;
    }
    if (next === displaySub) {
      setFadingSub(false);
      return;
    }
    setFadingSub(true);
    const t = setTimeout(() => {
      setDisplaySub(next);
      setFadingSub(false);
    }, 200);
    return () => {
      clearTimeout(t);
      setFadingSub(false);
    };
  }, [effective, displaySub]);

  useEffect(() => {
    let next = 'Escríbenos por WhatsApp';
    if (selected) {
      const labels = {
        1: 'Hablemos de tus molestias',
        2: 'Hablemos de tu vuelta',
        3: 'Hablemos de tu rendimiento',
        4: 'Hablemos de tu lesión'
      };
      next = labels[selected] || next;
    }
    if (next === displayCta) {
      setFadingCta(false);
      return;
    }
    setFadingCta(true);
    const t = setTimeout(() => {
      setDisplayCta(next);
      setFadingCta(false);
    }, 180);
    return () => {
      clearTimeout(t);
      setFadingCta(false);
    };
  }, [selected, displayCta]);

  useEffect(() => {
    if (selected && selected !== previousSelected.current) {
      setPingKey(k => k + 1);
    }
    previousSelected.current = selected;
  }, [selected]);

  const eyebrowRef = useReveal(0.1);
  const titleRef = useReveal(0.1);
  const subRef = useReveal(0.1);
  const selLabelRef = useReveal(0.1);
  const gridRef = useReveal(0.1);
  // altRef removed — profile-alt visibility managed by selection state, not scroll reveal
  const ctaRef = useReveal(0.1);

  return (
    <section className={`hero ${selected ? 'is-selected' : ''}`} id="top">

    </div>
  );
}

function CtaFinal({ selected, waUrl }) {
  const content = (selected && CTA_FINAL[selected]) || CTA_FINAL_DEFAULT;
  const [displayed, setDisplayed] = useState(content);
  const [fading, setFading] = useState(false);

  useEffect(() => {
    if (displayed.title === content.title) {
      setFading(false);
      return;
    }
    setFading(true);
    const t = setTimeout(() => {
      setDisplayed(content);
      setFading(false);
    }, 220);
    return () => {
      clearTimeout(t);
      setFading(false);
    };
  }, [content, displayed.title]);

  const ref = useReveal(0.15);
  return (
    <section className="cta-final">
      <div className="cta-block-outer">
        <div ref={ref} className="cta-card reveal">
          <div className="cta-decor cd1" />
          <div className="cta-decor cd2" />
          <div className="cta-decor cd3" />
          <div className="cta-inner">
            <h2 className={`cta-title ${fading ? 'fading' : ''}`}>{displayed.title}</h2>
            <p className={`cta-subtitle ${fading ? 'fading' : ''}`}>{displayed.subtitle}</p>
            <a className="cta-button" href={waUrl} target="_blank" rel="noopener noreferrer">
              <WhatsAppGlyph />
              <span>Escríbenos por WhatsApp</span>
              <ArrowRight />
            </a>
            <div className="cta-caption-final">Sin compromiso. Te orientamos antes de que decidas.</div>
          </div>
        </div>
      </div>
    </section>
  );
}

    </footer>
  );
}

function StickyPrompt({ selected, setSelected }) {
  const [eligible, setEligible] = useState(false);
  const [dismissed, setDismissed] = useState(false);

  useEffect(() => {
    if (selected) return;
    const onScroll = () => {
      const hero = document.querySelector('.hero');
      if (!hero) return;
      const heroBottom = hero.getBoundingClientRect().bottom;
      setEligible(heroBottom < 120);
    };
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, [selected]);

  useEffect(() => {
    if (selected) setDismissed(false);
  }, [selected]);

  const show = eligible && !selected && !dismissed;

  const pickAndScroll = (id) => {
    setSelected(id);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  return (
    <div className={`sticky-prompt ${show ? 'show' : ''}`} role="region" aria-label="Elige tu perfil">
      <span className="sticky-prompt-label">¿Cuál te describe?</span>
      <div className="sticky-prompt-chips">
        <button type="button" className="sticky-chip" onClick={() => pickAndScroll(1)}>
          <ProfileIcon name="activity" /> Molestias
        </button>
        <button type="button" className="sticky-chip" onClick={() => pickAndScroll(2)}>
          <ProfileIcon name="heart" /> Post-lesión
        </button>
        <button type="button" className="sticky-chip" onClick={() => pickAndScroll(3)}>
          <ProfileIcon name="trending" /> Rendimiento
        </button>
        <button type="button" className="sticky-chip" onClick={() => pickAndScroll(4)}>
          Lesión activa
        </button>
      </div>
      <button type="button" className="sticky-prompt-close" onClick={() => setDismissed(true)} aria-label="Cerrar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
          <path d="M18 6 6 18" /><path d="m6 6 12 12" />
        </svg>
      </button>
    </div>
  );
}

function WhatsAppFloat({ waUrl, visible }) {
  return (
    <a
      className={`wa-float ${visible ? 'show' : ''}`}
      href={waUrl}
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Escríbenos por WhatsApp"
    >
      <WhatsAppGlyph />
      <span className="label">Escríbenos</span>
    </a>
  );
}

function App() {
  const [selected, setSelected] = useState(null);

  const msg = (() => {
    if (!selected) return DEFAULT_WA;
    const found = [...PROFILES, INJURY_PROFILE].find(p => p.id === selected);
    return found ? found.waMsg : DEFAULT_WA;
  })();

  const waUrl = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`;
  const openWA = () => window.open(waUrl, '_blank', 'noopener,noreferrer');
  const floatVisible = !!selected;

  return (
    <>
      <Navbar onCta={openWA} />
      <Hero selected={selected} setSelected={setSelected} waUrl={waUrl} />
      {selected === 4 ? (
        <>
          <FirstSession selected={selected} />
          <ServicesElevated />
          <Plans selected={selected} />
        </>
      ) : (
        <>
          <FirstSession selected={selected} />
          <Plans selected={selected} />
          <ServicesCompact />
        </>
      )}
      <Team />
      <Location waUrl={waUrl} />
      <CtaFinal selected={selected} waUrl={waUrl} />
      <Footer />
      <WhatsAppFloat waUrl={waUrl} visible={floatVisible} />
      <StickyPrompt selected={selected} setSelected={setSelected} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
